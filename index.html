<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BodyJourney</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:
    linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.9)),
    url("https://images.unsplash.com/photo-1530210124550-912dc1381cb8?q=80&w=1200&auto=format&fit=crop");

    background-size:cover;
    background-position:center;
    min-height:100vh;
    color:white;
}

/* NAVBAR */

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:25px 50px;
}

.logo{
    font-size:50px;
    font-weight:bold;
    color:#38bdf8;
    text-shadow:0 0 20px #38bdf8;
}

nav a{
    color:white;
    text-decoration:none;
    font-size:20px;
    font-weight:bold;
}

/* HERO */

.hero{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    margin-top:80px;
}

.hero h1{
    font-size:95px;
    margin-bottom:20px;
}

.hero p{
    font-size:30px;
    margin-bottom:35px;
}

.start-btn{
    padding:18px 50px;
    background:#38bdf8;
    border:none;
    border-radius:15px;
    color:white;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.start-btn:hover{
    background:#0ea5e9;
    transform:scale(1.05);
}

/* SYSTEMS */

.system-section{
    margin-top:120px;
    text-align:center;
}

.system-section h2{
    font-size:70px;
    color:#38bdf8;
    margin-bottom:45px;
    text-shadow:0 0 20px #38bdf8;
}

.system-card{
    width:420px;
    margin:auto;
    background:rgba(255,255,255,0.08);
    padding:40px;
    border-radius:25px;
    backdrop-filter:blur(10px);
    transition:0.3s;
    text-decoration:none;
    color:white;
    display:block;
}

.system-card:hover{
    transform:translateY(-10px);
    background:rgba(56,189,248,0.2);
}

.system-card h3{
    font-size:45px;
    color:#38bdf8;
    margin-bottom:20px;
}

.system-card p{
    font-size:26px;
    line-height:1.6;
}

/* FEATURES */

.features{
    margin-top:120px;
    padding-bottom:100px;
}

.features h2{
    text-align:center;
    font-size:70px;
    color:#38bdf8;
    margin-bottom:50px;
    text-shadow:0 0 20px #38bdf8;
}

.feature-grid{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

.feature-card{
    width:320px;
    background:rgba(255,255,255,0.08);
    padding:35px;
    border-radius:25px;
    text-align:center;
    text-decoration:none;
    color:white;
    transition:0.3s;
    backdrop-filter:blur(10px);
}

.feature-card:hover{
    transform:translateY(-10px);
    background:rgba(56,189,248,0.2);
    box-shadow:0 0 25px #38bdf8;
}

.feature-card h3{
    font-size:35px;
    margin-bottom:15px;
    color:#38bdf8;
}

.feature-card p{
    font-size:22px;
    line-height:1.5;
}

</style>

</head>

<body>

<nav>

<div class="logo">BodyJourney</div>

<a href="#">Home</a>

</nav>

<section class="hero">

<h1>Body Journey</h1>

<p>
เรียนรู้กายวิภาคศาสตร์แบบ Interactive
</p>

<button class="start-btn"

onclick="document.getElementById('systems').scrollIntoView({behavior:'smooth'})">

Start Learning

</button>

</section>

<section class="system-section" id="systems">

<h2>Body Systems</h2>

<a href="docs/skeletal.pdf" target="_blank" class="system-card">
    <h3>🦴 Skeletal System</h3>
    <p>เรียนรู้เกี่ยวกับกระดูกและข้อต่อของร่างกาย</p>
</a>

</section>

<section class="features">

<h2>Features</h2>

<div class="feature-grid">

<a href="video.html" class="feature-card">

<h3>🎥 Video Learning</h3>

<p>
เลือกดูผ่าน YouTube หรือ TikTok
</p>

</a>

<a href="quiz.html" class="feature-card">

<h3>📝 Quiz</h3>

<p>
แบบทดสอบพร้อมเฉลย
</p>

</a>

<a href="model.html" class="feature-card">

<h3>🦴 3D Anatomy</h3>

<p>
หมุน ซูม และสำรวจโมเดล 3D
</p>

</a>

</div>

</section>

</body>
</html>
