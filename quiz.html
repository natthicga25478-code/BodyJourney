<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bone Quiz</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#050816;
    color:white;
}

.quiz-container{
    width:90%;
    max-width:800px;
    margin:auto;
    margin-top:40px;
    background:#111827;
    padding:40px;
    border-radius:25px;
    text-align:center;
}

h1{
    color:#38bdf8;
    font-size:55px;
    margin-bottom:30px;
    text-shadow:0 0 20px #38bdf8;
}

#question-image{
    width:350px;
    max-width:100%;
    border-radius:20px;
    margin-bottom:25px;
}

#question{
    font-size:38px;
    margin-bottom:30px;
}

.btn{
    width:100%;
    padding:18px;
    margin:12px 0;
    border:none;
    border-radius:15px;
    background:#1e293b;
    color:white;
    font-size:24px;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:#38bdf8;
    color:black;
}

#next-btn{
    margin-top:25px;
    padding:16px 35px;
    border:none;
    border-radius:15px;
    background:#38bdf8;
    color:black;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    display:none;
}

</style>
</head>

<body>

<div class="quiz-container">

<h1>Bone Quiz</h1>

<img id="question-image">

<h2 id="question"></h2>

<div id="answer-buttons"></div>

<button id="next-btn">Next</button>

</div>

<script>

const questions = [

{
    image:"images/metacarpals.jpg",

    question:"กระดูกที่ถูกไฮไลต์ในภาพคือกระดูกส่วนใด?",

    answers:[
        {text:"Metacarpals", correct:true},
        {text:"Phalanges", correct:false},
        {text:"Carpals", correct:false},
        {text:"Radius", correct:false}
    ]
},

{
    image:"images/patella.jpg",

    question:"กระดูกสีเขียวในภาพเรียกว่าอะไร?",

    answers:[
        {text:"Femur", correct:false},
        {text:"Patella", correct:true},
        {text:"Tibia", correct:false},
        {text:"Fibula", correct:false}
    ]
},

{
    image:"images/sacrum.jpg",

    question:"กระดูกสีแดงในภาพคืออะไร?",

    answers:[
        {text:"Pelvis", correct:false},
        {text:"Coccyx", correct:false},
        {text:"Sacrum", correct:true},
        {text:"Lumbar", correct:false}
    ]
},

{
    image:"images/scapula.jpg",

    question:"กระดูกสีแดงบริเวณหลังนี้เรียกว่าอะไร?",

    answers:[
        {text:"Clavicle", correct:false},
        {text:"Rib", correct:false},
        {text:"Scapula", correct:true},
        {text:"Humerus", correct:false}
    ]
},

{
    image:"images/sternum.jpg",

    question:"กระดูกสีแดงกลางหน้าอกคือกระดูกอะไร?",

    answers:[
        {text:"Rib", correct:false},
        {text:"Clavicle", correct:false},
        {text:"Sternum", correct:true},
        {text:"Scapula", correct:false}
    ]
}

];

const questionElement = document.getElementById("question");
const answerButtons = document.getElementById("answer-buttons");
const nextButton = document.getElementById("next-btn");
const questionImage = document.getElementById("question-image");

let currentQuestionIndex = 0;
let score = 0;

function startQuiz(){

    currentQuestionIndex = 0;
    score = 0;

    showQuestion();

}

function showQuestion(){

    questionImage.style.display = "block";

    resetState();

    let currentQuestion = questions[currentQuestionIndex];

    questionElement.innerHTML = currentQuestion.question;

    questionImage.src = currentQuestion.image;

    currentQuestion.answers.forEach(answer => {

        const button = document.createElement("button");

        button.innerHTML = answer.text;

        button.classList.add("btn");

        answerButtons.appendChild(button);

        if(answer.correct){
            button.dataset.correct = answer.correct;
        }

        button.addEventListener("click", selectAnswer);

    });

}

function resetState(){

    nextButton.style.display = "none";

    while(answerButtons.firstChild){

        answerButtons.removeChild(answerButtons.firstChild);

    }

}

function selectAnswer(e){

    const selectedBtn = e.target;

    const isCorrect = selectedBtn.dataset.correct === "true";

    if(isCorrect){

        selectedBtn.style.background = "green";

        score++;

    }else{

        selectedBtn.style.background = "red";

    }

    Array.from(answerButtons.children).forEach(button => {

        if(button.dataset.correct === "true"){

            button.style.background = "green";

        }

        button.disabled = true;

    });

    nextButton.style.display = "block";

}

function showScore(){

    resetState();

    questionElement.innerHTML =
    `คุณได้ ${score} / ${questions.length} คะแนน`;

    questionImage.style.display = "none";

    nextButton.innerHTML = "Play Again";

    nextButton.style.display = "block";

}

function handleNextButton(){

    currentQuestionIndex++;

    if(currentQuestionIndex < questions.length){

        showQuestion();

    }else{

        showScore();

    }

}

nextButton.addEventListener("click", ()=>{

    if(currentQuestionIndex < questions.length){

        handleNextButton();

    }else{

        startQuiz();

    }

});

startQuiz();

</script>

</body>
</html>
